{% extends 'core/base.html' %}
{% block title %}Editar Taller{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-8"><div class="card"><div class="card-header"><h3>✏️ Editar Taller</h3></div><div class="card-body"><form method="post">{% csrf_token %}<div class="mb-3"><label>Nombre</label><input type="text" name="nombre" class="form-control" value="{{ taller.nombre }}" required></div><div class="mb-3"><label>Descripción</label><textarea name="descripcion" class="form-control" rows="3">{{ taller.descripcion }}</textarea></div><div class="mb-3"><label>Fecha y Hora</label><input type="datetime-local" name="fecha" class="form-control" value="{{ taller.fecha|date:'Y-m-d\\TH:i' }}" required></div><div class="mb-3"><label>Duración (horas)</label><input type="number" name="duracion_horas" class="form-control" value="{{ taller.duracion_horas }}" required></div><div class="mb-3"><label>Cupos Totales</label><input type="number" name="cupos" class="form-control" value="{{ taller.cupos }}" required></div><div class="mb-3"><label>Cupos Disponibles</label><input type="number" name="cupos_disponibles" class="form-control" value="{{ taller.cupos_disponibles }}" required></div><div class="mb-3"><label>Instructor</label><input type="text" name="instructor" class="form-control" value="{{ taller.instructor }}" required></div><div class="mb-3"><label>Precio ($)</label><input type="number" step="0.01" name="precio" class="form-control" value="{{ taller.precio }}" required></div><button type="submit" class="btn btn-warning">Actualizar</button> <a href="{% url 'lista_talleres' %}" class="btn btn-secondary">Cancelar</a></form></div></div></div></div>
{% endblock %}
