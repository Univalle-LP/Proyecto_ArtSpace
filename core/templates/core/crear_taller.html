{% extends 'core/base.html' %}
{% block title %}Crear Taller{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-8"><div class="card"><div class="card-header"><h3>📅 Nuevo Taller</h3></div><div class="card-body"><form method="post">{% csrf_token %}<div class="mb-3"><label>Nombre</label><input type="text" name="nombre" class="form-control" required></div><div class="mb-3"><label>Descripción</label><textarea name="descripcion" class="form-control" rows="3"></textarea></div><div class="mb-3"><label>Fecha y Hora</label><input type="datetime-local" name="fecha" class="form-control" required></div><div class="mb-3"><label>Duración (horas)</label><input type="number" name="duracion_horas" class="form-control" required></div><div class="mb-3"><label>Cupos</label><input type="number" name="cupos" class="form-control" required></div><div class="mb-3"><label>Instructor</label><input type="text" name="instructor" class="form-control" required></div><div class="mb-3"><label>Precio ($)</label><input type="number" step="0.01" name="precio" class="form-control" required></div><button type="submit" class="btn btn-success">Crear Taller</button> <a href="{% url 'lista_talleres' %}" class="btn btn-secondary">Cancelar</a></form></div></div></div></div>
{% endblock %}
